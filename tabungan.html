<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Bank App</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS akan ditambahkan pada bagian berikutnya -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>🏦 Modern Bank</h1>
        <button id="darkMode">🌙</button>
    </header>

    <section class="card">
        <div class="chip"></div>

        <h2>Saldo</h2>

        <h1 id="saldo">
            Rp0
        </h1>

        <div class="card-footer">
            <div>
                <small>Nama</small>
                <h3>ZIDAN</h3>
            </div>

            <div>
                <small>Nomor Rekening</small>
                <h3>87892284280</h3>
            </div>
        </div>

    </section>

    <section class="target">

        <h2>🎯 Target Tabungan</h2>

        <h3 id="targetText">
            Rp1.000.000
        </h3>

        <div class="progress">

            <div
                class="progress-bar"
                id="progressBar">
            </div>

        </div>

        <p id="persen">
            0%
        </p>

    </section>

    <section class="action">

        <input
            type="number"
            id="nominal"
            placeholder="Masukkan nominal">

        <div class="buttons">

            <button
                id="btnTambah">
                ➕ Tambah
            </button>

            <button
                id="btnKurang">
                ➖ Tarik
            </button>

            <button
                id="btnTransfer">
                💸 Transfer
            </button>

            <button
                id="btnReset">
                🔄 Reset
            </button>

        </div>

    </section>

    <section class="statistik">

        <div class="box">

            <h3>Pemasukan</h3>

            <h2 id="masuk">
                Rp0
            </h2>

        </div>

        <div class="box">

            <h3>Pengeluaran</h3>

            <h2 id="keluar">
                Rp0
            </h2>

        </div>

    </section>

    <section class="riwayat">

        <h2>
            📝 Riwayat Transaksi
        </h2>

        <ul id="history">

            <li>
                Belum ada transaksi
            </li>

        </ul>

    </section>

</div>

<!-- JavaScript akan ditambahkan pada bagian berikutnya -->
<script src="style.js"></script>

</body>
</html>
